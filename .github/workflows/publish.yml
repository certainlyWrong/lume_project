# Publishes rust_lib_lume and/or lume to pub.dev via OIDC (no secrets needed).
#
# AUTH SETUP (once, per package on pub.dev):
#   Package page -> Admin -> Automated publishing -> GitHub Actions
#   Repository : certainlyWrong/lume_project
#   Tag pattern: v{{version}}
#
# pub.dev so aceita OIDC quando o workflow e disparado por push de tag.
# workflow_dispatch nao funciona com OIDC e sera rejeitado pelo pub.dev.
#
# RELEASE FLOW:
#   1. Bump version em pubspec.yaml (rust_builder + lume)
#   2. Adicione entrada ## <version> no CHANGELOG.md de cada pacote
#   3. git tag v<semver> && git push --tags   <- dispara este workflow

name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # obrigatorio para OIDC com pub.dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── rust_lib_lume ────────────────────────────────────────────────────────

      - name: Validate rust_lib_lume CHANGELOG
        run: |
          VERSION=$(grep '^version:' lume/rust_builder/pubspec.yaml | awk '{print $2}')
          if ! grep -qE "^## $VERSION" lume/rust_builder/CHANGELOG.md; then
            echo "::error::lume/rust_builder/CHANGELOG.md nao menciona a versao $VERSION."
            echo "Adicione uma secao '## $VERSION' antes de publicar."
            exit 1
          fi

      - name: Publish rust_lib_lume
        working-directory: lume/rust_builder
        run: flutter pub publish --force

      # pub.dev pode levar ate 10 minutos para indexar uma nova versao.
      # Aguarda rust_lib_lume estar disponivel antes de publicar lume.
      - name: Wait for rust_lib_lume to be indexed on pub.dev
        run: |
          VERSION=$(grep '^version:' lume/rust_builder/pubspec.yaml | awk '{print $2}')
          echo "Polling pub.dev for rust_lib_lume $VERSION..."
          for i in $(seq 1 20); do
            if curl -sf "https://pub.dev/api/packages/rust_lib_lume/versions/$VERSION" > /dev/null; then
              echo "rust_lib_lume $VERSION is available on pub.dev"
              exit 0
            fi
            echo "[$i/20] Not yet indexed, retrying in 30s..."
            sleep 30
          done
          echo "::error::Timed out waiting for rust_lib_lume $VERSION"
          exit 1

      # ── lume ─────────────────────────────────────────────────────────────────

      - name: Validate lume CHANGELOG
        run: |
          VERSION=$(grep '^version:' lume/pubspec.yaml | awk '{print $2}')
          if ! grep -qE "^## $VERSION" lume/CHANGELOG.md; then
            echo "::error::lume/CHANGELOG.md nao menciona a versao $VERSION."
            echo "Adicione uma secao '## $VERSION' antes de publicar."
            exit 1
          fi

      # lume/pubspec.yaml usa `resolution: workspace` para desenvolvimento local,
      # que nao e aceito no pub.dev. Remove antes de publicar.
      # Tambem troca path dep de rust_lib_lume por versao hosted se necessario.
      - name: Prepare lume/pubspec.yaml for pub.dev
        run: |
          RUST_VERSION=$(grep '^version:' lume/rust_builder/pubspec.yaml | awk '{print $2}')

          sed -i '/^resolution: workspace$/d' lume/pubspec.yaml

          perl -i -0pe \
            "s/  rust_lib_lume:\\n    path: rust_builder/  rust_lib_lume: ^$RUST_VERSION/" \
            lume/pubspec.yaml

          echo "--- lume/pubspec.yaml apos preparacao ---"
          cat lume/pubspec.yaml

      - name: Publish lume
        working-directory: lume
        run: flutter pub publish --force
