# Publishes rust_lib_lume and/or lume to pub.dev.
#
# AUTH SETUP (once):
#   1. Run locally:  cat ~/.pub-cache/credentials.json
#   2. Copie o JSON inteiro e salve como secret no GitHub:
#      Repo → Settings → Secrets → Actions → New secret
#      Name : PUB_CREDENTIALS
#      Value: <conteúdo do credentials.json>
#
# RELEASE FLOW:
#   1. Bump version em pubspec.yaml (rust_builder + lume se necessário)
#   2. Adicione entrada ## <version> no CHANGELOG.md de cada pacote
#   3. git tag v<semver> && git push --tags   ← dispara este workflow
#
# MANUAL RUN:
#   Actions → "Publish to pub.dev" → Run workflow → escolha o pacote

name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        default: both
        type: choice
        options:
          - rust_lib_lume
          - lume
          - both

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure pub.dev credentials
        run: |
          mkdir -p "$HOME/.pub-cache"
          echo '${{ secrets.PUB_CREDENTIALS }}' > "$HOME/.pub-cache/credentials.json"

      # ── rust_lib_lume ────────────────────────────────────────────────────────

      - name: Validate rust_lib_lume CHANGELOG
        if: |
          github.event_name == 'push' ||
          github.event.inputs.package == 'rust_lib_lume' ||
          github.event.inputs.package == 'both'
        run: |
          VERSION=$(grep '^version:' lume/rust_builder/pubspec.yaml | awk '{print $2}')
          if ! grep -qE "^## $VERSION" lume/rust_builder/CHANGELOG.md; then
            echo "::error::lume/rust_builder/CHANGELOG.md não menciona a versão $VERSION."
            echo "Adicione uma seção '## $VERSION' antes de publicar."
            exit 1
          fi

      - name: Publish rust_lib_lume
        if: |
          github.event_name == 'push' ||
          github.event.inputs.package == 'rust_lib_lume' ||
          github.event.inputs.package == 'both'
        working-directory: lume/rust_builder
        run: flutter pub publish --force

      # pub.dev pode levar até 10 minutos para indexar uma nova versão.
      # Aguarda rust_lib_lume estar disponível antes de publicar lume.
      - name: Wait for rust_lib_lume to be indexed on pub.dev
        if: |
          github.event_name == 'push' ||
          github.event.inputs.package == 'both'
        run: |
          VERSION=$(grep '^version:' lume/rust_builder/pubspec.yaml | awk '{print $2}')
          echo "Polling pub.dev for rust_lib_lume $VERSION..."
          for i in $(seq 1 20); do
            if curl -sf "https://pub.dev/api/packages/rust_lib_lume/versions/$VERSION" > /dev/null; then
              echo "rust_lib_lume $VERSION is available on pub.dev"
              exit 0
            fi
            echo "[$i/20] Not yet indexed, retrying in 30s..."
            sleep 30
          done
          echo "::error::Timed out waiting for rust_lib_lume $VERSION"
          exit 1

      # ── lume ─────────────────────────────────────────────────────────────────

      - name: Validate lume CHANGELOG
        if: |
          github.event_name == 'push' ||
          github.event.inputs.package == 'lume' ||
          github.event.inputs.package == 'both'
        run: |
          VERSION=$(grep '^version:' lume/pubspec.yaml | awk '{print $2}')
          if ! grep -qE "^## $VERSION" lume/CHANGELOG.md; then
            echo "::error::lume/CHANGELOG.md não menciona a versão $VERSION."
            echo "Adicione uma seção '## $VERSION' antes de publicar."
            exit 1
          fi

      # lume/pubspec.yaml usa `resolution: workspace` para desenvolvimento local,
      # que não é aceito no pub.dev. Remove antes de publicar.
      # Também troca path dep de rust_lib_lume por versão hosted se necessário.
      - name: Prepare lume/pubspec.yaml for pub.dev
        if: |
          github.event_name == 'push' ||
          github.event.inputs.package == 'lume' ||
          github.event.inputs.package == 'both'
        run: |
          RUST_VERSION=$(grep '^version:' lume/rust_builder/pubspec.yaml | awk '{print $2}')

          sed -i '/^resolution: workspace$/d' lume/pubspec.yaml

          perl -i -0pe \
            "s/  rust_lib_lume:\\n    path: rust_builder/  rust_lib_lume: ^$RUST_VERSION/" \
            lume/pubspec.yaml

          echo "--- lume/pubspec.yaml após preparação ---"
          cat lume/pubspec.yaml

      - name: Publish lume
        if: |
          github.event_name == 'push' ||
          github.event.inputs.package == 'lume' ||
          github.event.inputs.package == 'both'
        working-directory: lume
        run: flutter pub publish --force
